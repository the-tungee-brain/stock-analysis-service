version: "3.9"

services:
  api:
    build: .
    container_name: sas-server-dev
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Tell your app how to reach Redis *inside* Docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
    # Optional: live-reload dev mode if your Dockerfile supports it
    # volumes:
    #   - .:/app

  redis:
    image: redis:7
    container_name: sas-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5