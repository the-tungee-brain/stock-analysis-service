name: Morning brief pre-warm

on:
  schedule:
    # 15 minutes before morning-brief dispatch (13:23 UTC).
    - cron: "8 13 * * *"
  workflow_dispatch:

jobs:
  prewarm:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-warm morning brief caches
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "Missing API_BASE_URL or CRON_SECRET repository secret."
            exit 1
          fi

          response="$(curl -sS --max-time 600 -w "\n%{http_code}" -X POST \
            "${API_BASE_URL%/}/internal/prewarm-morning-briefs" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json")"

          http_code="${response##*$'\n'}"
          body="${response%$'\n'*}"

          echo "HTTP ${http_code}"
          echo "${body}"

          if [ "${http_code}" -ge 400 ]; then
            exit 1
          fi

          failed="$(echo "${body}" | python3 -c "import json,sys; print(json.load(sys.stdin).get('failed', 0))")"
          if [ "${failed}" != "0" ]; then
            echo "Morning brief pre-warm reported failures."
            exit 1
          fi
