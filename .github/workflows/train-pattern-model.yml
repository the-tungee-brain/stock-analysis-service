name: Train Pattern Model

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: Extra symbols beyond TOP20 (space-separated). Leave blank for TOP20 only.
        required: false
        default: ""
      train_end:
        description: Last training date (YYYY-MM-DD). Leave blank for yesterday.
        required: false
        default: ""
      deploy:
        description: Copy artifacts to OCI VM and restart sas-server
        required: false
        type: boolean
        default: true
  schedule:
    # Sundays 06:15 UTC — after US markets close for the week
    - cron: "15 6 * * 0"

concurrency:
  group: train-pattern-model
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline
        env:
          YFINANCE_CACHE_DIR: ${{ runner.temp }}/yfinance-cache
          PYTHONPATH: .
        run: |
          set -euo pipefail
          CMD=(python scripts/train_tradeable_model.py --universe top20)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.symbols }}" ]; then
            read -r -a EXTRA <<< "${{ inputs.symbols }}"
            CMD+=(--extra-symbols "${EXTRA[@]}")
          fi
          if [ -n "${{ inputs.train_end }}" ]; then
            CMD+=(--train-end "${{ inputs.train_end }}")
          fi
          "${CMD[@]}"

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pattern-model-${{ github.run_id }}
          path: |
            artifacts/model_xgb.joblib
            artifacts/model_meta.json
          retention-days: 30

      - name: Show model metadata
        run: cat artifacts/model_meta.json

      - name: Prepare remote artifact directory
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
          (github.event_name == 'schedule' && github.ref == 'refs/heads/main')
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            rm -rf /home/ubuntu/pattern-artifacts-staging
            mkdir -p /home/ubuntu/pattern-artifacts-staging
            sudo mkdir -p /home/ubuntu/sas-pattern-artifacts

      - name: Deploy artifacts to OCI VM
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
          (github.event_name == 'schedule' && github.ref == 'refs/heads/main')
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "artifacts/model_xgb.joblib,artifacts/model_meta.json"
          target: /home/ubuntu/pattern-artifacts-staging
          strip_components: 1

      - name: Install artifacts and restart sas-server
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
          (github.event_name == 'schedule' && github.ref == 'refs/heads/main')
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            STAGING=/home/ubuntu/pattern-artifacts-staging
            DEST=/home/ubuntu/sas-pattern-artifacts
            test -f "$STAGING/model_xgb.joblib"
            test -f "$STAGING/model_meta.json"
            sudo cp -f "$STAGING/model_xgb.joblib" "$STAGING/model_meta.json" "$DEST"/
            sudo chmod 644 "$DEST"/model_xgb.joblib "$DEST"/model_meta.json
            rm -rf "$STAGING"
            if docker ps --format '{{.Names}}' | grep -qx sas-server; then
              docker restart sas-server
              sleep 5
              docker exec sas-server python scripts/smoke_pattern_runtime.py --symbol NVDA --direct-only
              curl -sf http://localhost:8000/health || echo "Warning: health check failed after restart"
            else
              echo "sas-server container not running; artifacts installed for next deploy"
            fi
