name: Load test — morning brief

on:
  workflow_dispatch:
    inputs:
      include_dispatch:
        description: "Also run dispatch (SENDS EMAIL — staging only)"
        required: false
        default: false
        type: boolean
      prewarm_max_seconds:
        description: "Prewarm timeout / p95 threshold (seconds)"
        required: false
        default: "600"
        type: string

jobs:
  loadtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Check secrets
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${API_BASE_URL}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "Missing API_BASE_URL or CRON_SECRET repository secrets."
            exit 1
          fi
          k6 version

      - name: Pre-warm load test
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PREWARM_MAX_SECONDS: ${{ inputs.prewarm_max_seconds }}
        run: k6 run loadtests/morning_brief_prewarm.js

      - name: Dispatch load test (sends email)
        if: inputs.include_dispatch == true
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ALLOW_DISPATCH: "true"
          DISPATCH_MAX_SECONDS: "300"
        run: k6 run loadtests/morning_brief_dispatch.js
