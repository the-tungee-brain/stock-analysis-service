name: Ranking pipeline (daily)

on:
  schedule:
    - cron: "0 7 * * 2-6"
  workflow_dispatch:

jobs:
  ranking-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run nightly ranking
        run: python scripts/run_ranking_daily.py
        continue-on-error: true
