name: Ranking pipeline (VM)

on:
  schedule:
    # Tue–Sat 07:30 UTC: daily ranking + portfolio (after US close, before EU open)
    - cron: "30 7 * * 2-6"
    # Sun 06:00 UTC: universe refresh
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly
          - bootstrap
          - bootstrap-resume

concurrency:
  group: ranking-pipeline-vm
  cancel-in-progress: false

jobs:
  resolve-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 6 * * 0" ]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
          fi

  run-on-vm:
    runs-on: ubuntu-latest
    needs: resolve-mode
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Copy pipeline script to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: scripts/vm/ranking_pipeline_remote.sh
          target: /home/ubuntu/
          strip_components: 2

      - name: Run ranking pipeline in sas-server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 360m
          script: |
            chmod +x /home/ubuntu/ranking_pipeline_remote.sh
            /home/ubuntu/ranking_pipeline_remote.sh ${{ needs.resolve-mode.outputs.mode }}
