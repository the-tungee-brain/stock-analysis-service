name: Deploy SAS Server to OCI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: tungxd96/sas-server:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to OCI VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull tungxd96/sas-server:latest
          docker stop sas-server || true
          docker rm sas-server || true
          docker run -d \
            --name sas-server \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e SCHWAB_CLIENT_ID="${{ secrets.SCHWAB_CLIENT_ID }}" \
            -e SCHWAB_CLIENT_SECRET="${{ secrets.SCHWAB_CLIENT_SECRET }}" \
            -e SCHWAB_REDIRECT_URI="${{ secrets.SCHWAB_REDIRECT_URI }}" \
            -e SCHWAB_TRADER_API_URI="${{ secrets.SCHWAB_TRADER_API_URI }}" \
            -p 8000:8000 \
            --restart always \
            tungxd96/sas-server:latest
          sudo nginx -t && sudo systemctl restart nginx
          curl localhost:8000 || echo "Health check failed"
