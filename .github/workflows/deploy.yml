name: Deploy SAS Server to OCI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: tungxd96/sas-server:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to OCI VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Start/refresh Redis container
          docker stop redis || true
          docker rm redis || true
          docker run -d \
            --name redis \
            -p 6379:6379 \
            -v redis-data:/data \
            --restart unless-stopped \
            redis:7-alpine \
            redis-server --appendonly yes --requirepass "${{ secrets.REDIS_PASSWORD }}"

          # Deploy app container
          docker pull tungxd96/sas-server:latest
          docker stop sas-server || true
          docker rm sas-server || true
          docker run -d \
            --name sas-server \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e SCHWAB_CLIENT_ID="${{ secrets.SCHWAB_CLIENT_ID }}" \
            -e SCHWAB_CLIENT_SECRET="${{ secrets.SCHWAB_CLIENT_SECRET }}" \
            -e SCHWAB_REDIRECT_URI="${{ secrets.SCHWAB_REDIRECT_URI }}" \
            -e SCHWAB_TRADER_API_URI="${{ secrets.SCHWAB_TRADER_API_URI }}" \
            -e SCHWAB_OAUTH_URI="${{ secrets.SCHWAB_OAUTH_URI }}" \
            -e POWERPOCKET_FRONTEND_URI="${{ secrets.POWERPOCKET_FRONTEND_URI }}" \
            -e POWERPOCKETDB_USER="${{ secrets.POWERPOCKETDB_USER }}" \
            -e POWERPOCKETDB_PASSWORD="${{ secrets.POWERPOCKETDB_PASSWORD }}" \
            -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
            -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
            -e POWERPOCKETDB_HOST="${{ secrets.POWERPOCKETDB_HOST }}" \
            -e POWERPOCKETDB_PORT="${{ secrets.POWERPOCKETDB_PORT }}" \
            -e POWERPOCKETDB_SERVICE_NAME="${{ secrets.POWERPOCKETDB_SERVICE_NAME }}" \
            -p 8000:8000 \
            --restart always \
            tungxd96/sas-server:latest

          sudo nginx -t && sudo systemctl restart nginx
          sleep 3
          curl -f localhost:8000 || echo "Health check failed"

