name: Deploy SAS Server to OCI

on:
  push:
    branches: [main]

# Queue deploys: a new push waits until the current run finishes (no cancel).
concurrency:
  group: deploy-sas-server-main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: tungxd96/sas-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy ranking pipeline script to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: scripts/vm/ranking_pipeline_remote.sh
          target: /home/ubuntu/
          strip_components: 2

      - name: Deploy to OCI VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            # Shared Docker network for redis + sas-server
            docker network create sas-net || true

            # Redis
            docker stop redis || true
            docker rm redis || true
            docker run -d \
              --name redis \
              --network sas-net \
              -p 6379:6379 \
              -v redis-data:/data \
              --memory=768m \
              --memory-swap=768m \
              --cpus=0.5 \
              --restart unless-stopped \
              redis:7-alpine \
              redis-server --appendonly yes --requirepass "${{ secrets.REDIS_PASSWORD }}" --maxmemory 512mb --maxmemory-policy allkeys-lru

            # Persistent ranking store only (do NOT mount over /app/data — that shadows the Python package)
            mkdir -p /home/ubuntu/sas-ranking-persist/data/raw
            mkdir -p /home/ubuntu/sas-ranking-persist/data/ranking/features
            mkdir -p /home/ubuntu/sas-pattern-artifacts
            test -s /home/ubuntu/sas-pattern-artifacts/model_xgb.joblib || {
              echo "Missing /home/ubuntu/sas-pattern-artifacts/model_xgb.joblib"
              echo "Run the Train Pattern Model workflow with deploy=true before deploying sas-server."
              exit 1
            }
            test -s /home/ubuntu/sas-pattern-artifacts/model_meta.json || {
              echo "Missing /home/ubuntu/sas-pattern-artifacts/model_meta.json"
              echo "Run the Train Pattern Model workflow with deploy=true before deploying sas-server."
              exit 1
            }

            # Backend
            docker pull tungxd96/sas-server:latest
            docker stop sas-server || true
            docker rm sas-server || true
            docker run -d \
              --name sas-server \
              --network sas-net \
              -p 8000:8000 \
              -v /home/ubuntu/sas-pattern-artifacts:/app/artifacts \
              -v /home/ubuntu/sas-ranking-persist/data/raw:/app/data/raw \
              -v /home/ubuntu/sas-ranking-persist/data/ranking:/app/data/ranking \
              -e PYTHONPATH=/app \
              -e RANKING_MAX_WORKERS=4 \
              -e YFINANCE_MIN_INTERVAL_SEC=0.4 \
              -e PATTERN_ARTIFACT_DIR=/app/artifacts \
              --memory=5g \
              --memory-swap=6g \
              --cpus=3.5 \
              -e GUNICORN_WORKERS=3 \
              -e GUNICORN_TIMEOUT=300 \
              -e RESEARCH_FETCH_WORKERS=6 \
              -e PEER_FETCH_WORKERS=3 \
              -e RESEARCH_CONTEXT_CACHE_TTL_SECONDS=3600 \
              -e ENRICHED_NEWS_CACHE_TTL_SECONDS=1800 \
              -e PORTFOLIO_BRIEF_CACHE_TTL_SECONDS=1800 \
              -e MORNING_BRIEF_PREWARM_WORKERS=20 \
              -e MORNING_BRIEF_DISPATCH_WORKERS=20 \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e SCHWAB_CLIENT_ID="${{ secrets.SCHWAB_CLIENT_ID }}" \
              -e SCHWAB_CLIENT_SECRET="${{ secrets.SCHWAB_CLIENT_SECRET }}" \
              -e SCHWAB_REDIRECT_URI="${{ secrets.SCHWAB_REDIRECT_URI }}" \
              -e SCHWAB_TRADER_API_URI="${{ secrets.SCHWAB_TRADER_API_URI }}" \
              -e SCHWAB_OAUTH_URI="${{ secrets.SCHWAB_OAUTH_URI }}" \
              -e POWERPOCKET_FRONTEND_URI="${{ secrets.POWERPOCKET_FRONTEND_URI }}" \
              -e POWERPOCKETDB_USER="${{ secrets.POWERPOCKETDB_USER }}" \
              -e POWERPOCKETDB_PASSWORD="${{ secrets.POWERPOCKETDB_PASSWORD }}" \
              -e POWERPOCKETDB_TP_TNS="${{ secrets.POWERPOCKETDB_TP_TNS }}" \
              -e SCHWAB_MARKET_URI="${{ secrets.SCHWAB_MARKET_URI }}" \
              -e FINNHUB_API_KEY="${{ secrets.FINNHUB_API_KEY }}" \
              -e FINNHUB_TIMEOUT_SECONDS=15 \
              -e MAX_ACTIVE_USERS=5 \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
              -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
              -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              -e CRON_SECRET="${{ secrets.CRON_SECRET }}" \
              -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              -e MORNING_BRIEF_FROM_EMAIL="${{ secrets.MORNING_BRIEF_FROM_EMAIL }}" \
              -e PAID_USER_EMAILS="${{ secrets.PAID_USER_EMAILS }}" \
              -e PAID_USER_IDS="${{ secrets.PAID_USER_IDS }}" \
              --restart always \
              tungxd96/sas-server:latest

            docker exec sas-server python -c "import ranking_pipeline, data.download; print('pipeline imports ok')"
            docker exec sas-server python scripts/smoke_pattern_runtime.py --symbol NVDA --direct-only

            mkdir -p /home/ubuntu/logs
            chmod +x /home/ubuntu/ranking_pipeline_remote.sh
            echo "Deploy only — ranking runs via Ranking pipeline (VM) workflow, not on deploy"

            sudo nginx -t && sudo systemctl restart nginx
            sleep 3
            curl -f localhost:8000/health || echo "Health check failed"
