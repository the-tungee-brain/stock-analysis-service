name: Day Trade backtest

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Ticker symbols, comma-separated"
        required: true
        default: "NVDA,AAPL,MSFT,AMZN,TSLA,SPY,QQQ"
        type: string
      start:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2026-01-01"
        type: string
      end:
        description: "End date (YYYY-MM-DD)"
        required: true
        default: "2026-06-01"
        type: string
      risk_per_trade:
        description: "Dollar risk per trade"
        required: true
        default: "100"
        type: string

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SYMBOLS: ${{ inputs.symbols }}
      START_DATE: ${{ inputs.start }}
      END_DATE: ${{ inputs.end }}
      RISK_PER_TRADE: ${{ inputs.risk_per_trade }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgomp1
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify backend
        run: |
          set -euo pipefail
          python -m compileall app scripts
          python -m pytest tests/test_day_trade_backtest_service.py

      - name: Run Day Trade backtest
        run: |
          set -euo pipefail
          safe_symbols="$(printf '%s' "$SYMBOLS" | tr '[:lower:]' '[:upper:]' | tr -c 'A-Z0-9._-' '-')"
          artifact="artifacts/day-trade-backtest-${safe_symbols}-${START_DATE}-${END_DATE}.json"

          python scripts/run_day_trade_backtest.py \
            --symbols "$SYMBOLS" \
            --start "$START_DATE" \
            --end "$END_DATE" \
            --risk-per-trade "$RISK_PER_TRADE" \
            --output "$artifact"

          echo "BACKTEST_ARTIFACT=$artifact" >> "$GITHUB_ENV"

      - name: Upload daily rows artifact
        uses: actions/upload-artifact@v4
        with:
          name: day-trade-backtest-${{ inputs.symbols }}-${{ inputs.start }}-${{ inputs.end }}
          path: ${{ env.BACKTEST_ARTIFACT }}
